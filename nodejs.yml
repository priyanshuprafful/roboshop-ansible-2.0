- name: Manage Node.js module and install on target host
  hosts: all
  become: yes
  tasks:
    - name: Disable the nodejs module
      dnf:
        name: nodejs
        state: disabled
        module: yes

    - name: Enable the nodejs:18 module
      dnf:
        name: nodejs:18
        state: enabled
        module: yes

    - name: Install Node.js
      dnf:
        name: nodejs
        state: present
