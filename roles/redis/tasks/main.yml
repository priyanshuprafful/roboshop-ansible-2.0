- name: Enable Redis Module for version 6
  dnf:
    name: redis:remi-6.2
    state: present
    

- name: Install Redis
  dnf:
    name: redis
    state: present

- name: Modify redis configuration
  ansible.builtin.replace:
    path: /etc/redis.conf
    regexp: '127.0.0.1'
    replace: '0.0.0.0'

- name: Start Redis Service
  ansible.builtin.systemd:
    state: restarted
    name: redis
    enabled: true

